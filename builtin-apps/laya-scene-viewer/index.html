<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Laya Canvas Editor</title>
  <style>
    body { margin: 0; padding: 0; background-color: #1e1e1e; color: #ccc; font-family: monospace; overflow: hidden; width: 100vw; height: 100vh; display: block; }
    canvas { background-color: #1e1e1e; display: block; }
    #error-box { color: #ff5555; padding: 20px; display: none; position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.8); width: 100%; z-index: 100; }
  </style>
</head>
<body>
  <div id="error-box"></div>
  <canvas id="canvasViewport"></canvas>
  <script>
    let sceneData = null; let imageCache = {}; let scale = 1.0; let offsetX = 0; let offsetY = 0; let isPanning = false; let lastMouseX = 0; let lastMouseY = 0; let scenePath = '';
    const canvas = document.getElementById('canvasViewport'); const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); }
    window.addEventListener('resize', resizeCanvas);
    async function loadScene() {
      const urlParams = new URLSearchParams(window.location.search);
      const rawPayload = urlParams.get('payload');
      const errorBox = document.getElementById('error-box');
      if (!rawPayload) { errorBox.style.display = 'block'; errorBox.textContent = 'No payload provided'; return; }
      try {
        const payloadObj = JSON.parse(decodeURIComponent(rawPayload));
        const filePath = payloadObj.filePath;
        const normPath = filePath.replace(/\\/g, '/');
        scenePath = normPath.match(/^[a-zA-Z]:\//) ? '/' + normPath : normPath;
        const response = await fetch('workspace-file://' + scenePath);
        if (!response.ok) throw new Error('File load failed');
        sceneData = await response.json();
        if (sceneData.type === 'Scene') {
            const p = sceneData.props || {};
            offsetX = (window.innerWidth - (p.width || 640)) / 2;
            offsetY = (window.innerHeight - (p.height || 1136)) / 2;
        }
        await preloadImages(sceneData); resizeCanvas();
      } catch (err) { errorBox.style.display = 'block'; errorBox.textContent = err.toString(); }
    }
    async function resolveAssetUrl(skinName) {
      const parts = scenePath.split('/'); parts.pop();
      while (parts.length > 0) {
        const testUrl = 'workspace-file://' + parts.join('/') + '/Laya/assets/' + skinName;
        try { const res = await fetch(testUrl, { method: 'HEAD' }); if (res.ok) return testUrl; } catch (e) {}
        parts.pop();
      }
      return 'workspace-file://' + scenePath.split('/').slice(0, -1).join('/') + '/' + skinName;
    }
    async function preloadImages(node) {
      const p = node.props || {}; const skin = p.skin || p.texture;
      if ((node.type === 'Image' || node.type === 'Sprite') && skin && !imageCache[skin]) {
        const url = await resolveAssetUrl(skin);
        await new Promise(r => { const img = new Image(); img.onload = () => { imageCache[skin] = img; r(); }; img.onerror = () => r(); img.src = url; });
      }
      if (node.child) { for (const c of node.child) await preloadImages(c); }
    }
    function render() {
      if (!sceneData) return; ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
      _drawNode(sceneData, 0, 0); ctx.restore();
    }
    function _drawNode(node, px, py) {
      const p = node.props || {}; const x = px + (p.x || 0); const y = py + (p.y || 0); const w = p.width || 0; const h = p.height || 0;
      if (node.type === 'Scene') { ctx.fillStyle = p.sceneColor || '#000000'; ctx.fillRect(x, y, p.width || 800, p.height || 600); }
      else if (node.type === 'Label') {
        const text = (p.text || '').replace(/\\n/g, '\n'); const fontSize = p.fontSize || 20;
        ctx.font = fontSize + 'px sans-serif'; ctx.fillStyle = p.color || '#ffffff'; ctx.textBaseline = 'top';
        let ax = 0; if (p.align === 'center') { ctx.textAlign = 'center'; ax = w / 2; } else if (p.align === 'right') { ctx.textAlign = 'right'; ax = w; } else ctx.textAlign = 'left';
        const lines = text.split('\n'); let sy = y;
        if (p.valign === 'middle') sy = y + (h - lines.length * fontSize * 1.2) / 2; else if (p.valign === 'bottom') sy = y + h - lines.length * fontSize * 1.2;
        lines.forEach((l, i) => ctx.fillText(l, x + ax, sy + i * fontSize * 1.2));
      } else if ((node.type === 'Image' || node.type === 'Sprite') && (p.skin || p.texture)) {
        const img = imageCache[p.skin || p.texture]; if (img) ctx.drawImage(img, x, y, w || img.width, h || img.height);
      }
      if (node.child) { for (const c of node.child) _drawNode(c, x, y); }
    }
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault(); const zoomSpeed = 0.1; const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
      const oldScale = scale; scale = Math.max(0.1, Math.min(5, scale + delta));
      const mouseX = e.clientX; const mouseY = e.clientY;
      offsetX -= (mouseX - offsetX) * (scale / oldScale - 1); offsetY -= (mouseY - offsetY) * (scale / oldScale - 1);
      render();
    }, { passive: false });
    canvas.addEventListener('mousedown', (e) => { if (e.button === 1) { isPanning = true; lastMouseX = e.clientX; lastMouseY = e.clientY; canvas.style.cursor = 'grabbing'; } });
    window.addEventListener('mousemove', (e) => { if (isPanning) { offsetX += e.clientX - lastMouseX; offsetY += e.clientY - lastMouseY; lastMouseX = e.clientX; lastMouseY = e.clientY; render(); } });
    window.addEventListener('mouseup', (e) => { if (e.button === 1) { isPanning = false; canvas.style.cursor = 'default'; } });
    loadScene();
  </script>
</body>
</html>
